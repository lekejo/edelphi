# Use Docker's internal DNS resolver so upstreams are resolved lazily (not at startup)
resolver 127.0.0.11 valid=30s;

server {
    listen 80;
    server_name dev.edelphi.org localhost;

    location / {
        set $upstream http://edelphi:8080;
        proxy_pass $upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}

server {
    listen 80;
    server_name dev-auth.edelphi.org;

    location / {
        set $upstream http://keycloak:8080;
        proxy_pass $upstream;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }
}
